<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Harness guard and feedback loops</title>
  <desc id="desc">Plan and review feedback loops in Pi Workflow Harness.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#111827"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f97316"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#22c55e"/></linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.30"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#8b949e"/></marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#fbbf24"/></marker>
    <style>
      .title{fill:#f0f6fc;font:800 34px ui-sans-serif,system-ui,Segoe UI,sans-serif}.node-title{fill:#f0f6fc;font:800 22px ui-sans-serif,system-ui,Segoe UI,sans-serif;text-anchor:middle}.text{fill:#c9d1d9;font:600 15px ui-sans-serif,system-ui,Segoe UI,sans-serif;text-anchor:middle}.small{fill:#8b949e;font:700 13px ui-sans-serif,system-ui,Segoe UI,sans-serif;text-anchor:middle}.node{fill:#161b22;stroke:#30363d;stroke-width:1.5;filter:url(#shadow)}.line{stroke:#8b949e;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.repair{stroke:#fbbf24;stroke-width:2.5;fill:none;marker-end:url(#arrowAmber);stroke-dasharray:8 8}.pass{fill:#14351f;stroke:#238636}.fail{fill:#3b2608;stroke:#f59e0b}
    </style>
  </defs>
  <rect width="1200" height="560" rx="32" fill="url(#bg)"/>
  <text x="60" y="76" class="title">Feedback loops are the product behavior</text>

  <g transform="translate(92 154)">
    <rect class="node" width="176" height="106" rx="24"/><circle cx="88" cy="30" r="16" fill="url(#cyan)"/><text x="88" y="66" class="node-title">Plan</text><text x="88" y="90" class="text">spec + checks</text>
  </g>
  <path class="line" d="M278 207 H396"/>
  <g transform="translate(410 154)">
    <rect class="node" width="206" height="106" rx="24"/><circle cx="103" cy="30" r="16" fill="url(#amber)"/><text x="103" y="66" class="node-title">Ambiguity Guard</text><text x="103" y="90" class="text">DPAA + SBADR</text>
  </g>
  <path class="line" d="M626 207 H744"/>
  <g transform="translate(758 154)">
    <rect class="node" width="176" height="106" rx="24"/><circle cx="88" cy="30" r="16" fill="url(#green)"/><text x="88" y="66" class="node-title">Implement</text><text x="88" y="90" class="text">TDD + verify</text>
  </g>
  <path class="line" d="M944 207 H1030"/>
  <g transform="translate(1040 154)">
    <rect class="node" width="120" height="106" rx="24"/><circle cx="60" cy="30" r="16" fill="url(#pink)"/><text x="60" y="66" class="node-title">Review</text><text x="60" y="90" class="text">quality</text>
  </g>

  <path class="repair" d="M508 150 C430 62, 212 68, 178 150"/>
  <rect x="286" y="88" width="146" height="34" rx="17" class="fail"/><text x="359" y="110" class="small">FAIL: repair plan</text>

  <path class="repair" d="M1100 266 C1032 398, 824 398, 846 268"/>
  <rect x="900" y="372" width="164" height="34" rx="17" class="fail"/><text x="982" y="394" class="small">findings: fix code</text>

  <path class="line" d="M1100 266 C1070 442, 834 478, 600 456 C366 434, 188 382, 180 268" opacity="0.72"/>
  <rect x="497" y="428" width="206" height="38" rx="19" class="pass"/><text x="600" y="452" class="small">evidence returns to the next loop</text>

  <text x="513" y="318" class="text">Guard failures are not hidden.</text>
  <text x="513" y="344" class="text">They route the agent back to the smallest safe repair step.</text>
</svg>
