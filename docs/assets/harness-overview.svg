<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Pi Workflow Harness overview</title>
  <desc id="desc">A visual overview of a Pi coding-agent harness that turns loose AI coding sessions into governed workflows with interview, plan, ambiguity guard, implementation, review, documentation, commit, and approved push stages. Supporting components include external memory, field failure logs, TUI helpers, and installable project template files.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="52%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
    <style>
      .bg-text { fill: #8b949e; font: 500 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .title { fill: #f0f6fc; font: 800 44px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: -0.8px; }
      .subtitle { fill: #c9d1d9; font: 500 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .card-title { fill: #f0f6fc; font: 800 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .card-text { fill: #c9d1d9; font: 500 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .small { fill: #8b949e; font: 600 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .node { fill: #161b22; stroke: #30363d; stroke-width: 1.5; filter: url(#shadow); }
      .chip { fill: #0d1117; stroke: #30363d; stroke-width: 1; }
      .line { stroke: #8b949e; stroke-width: 2.2; fill: none; marker-end: url(#arrow); opacity: 0.9; }
      .dash { stroke: #4b5563; stroke-width: 1.8; stroke-dasharray: 6 7; fill: none; }
      .accent-cyan { fill: url(#cyan); }
      .accent-pink { fill: url(#pink); }
      .accent-green { fill: url(#green); }
      .accent-amber { fill: url(#amber); }
    </style>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="1080" cy="80" r="170" fill="#1f6feb" opacity="0.11"/>
  <circle cx="155" cy="690" r="180" fill="#d946ef" opacity="0.08"/>
  <path d="M65 112 C260 28, 362 150, 524 82 S842 31, 1080 164" class="dash" opacity="0.38"/>

  <text x="62" y="72" class="small">PORTFOLIO SNAPSHOT</text>
  <text x="62" y="124" class="title">Pi Workflow Harness</text>
  <text x="62" y="158" class="subtitle">Loose AI coding sessions → governed, reviewable development workflow</text>

  <g transform="translate(850 58)">
    <rect class="chip" width="270" height="42" rx="21"/>
    <circle cx="25" cy="21" r="8" class="accent-green"/>
    <text x="45" y="27" class="card-text">Install footprint: AGENTS.md + .pi/</text>
  </g>

  <!-- main pipeline -->
  <g transform="translate(60 230)">
    <rect class="node" x="0" y="0" width="150" height="92" rx="20"/>
    <circle cx="30" cy="32" r="15" class="accent-cyan"/>
    <text x="55" y="36" class="card-title">Interview</text>
    <text x="22" y="67" class="card-text">scope · risk · done</text>

    <path class="line" d="M158 46 H218"/>

    <rect class="node" x="230" y="0" width="150" height="92" rx="20"/>
    <circle cx="260" cy="32" r="15" class="accent-cyan"/>
    <text x="285" y="36" class="card-title">Plan</text>
    <text x="252" y="67" class="card-text">spec + tasks</text>

    <path class="line" d="M388 46 H448"/>

    <rect class="node" x="460" y="0" width="150" height="92" rx="20"/>
    <circle cx="490" cy="32" r="15" class="accent-amber"/>
    <text x="515" y="36" class="card-title">Guard</text>
    <text x="482" y="67" class="card-text">DPAA · SBADR</text>

    <path class="line" d="M618 46 H678"/>

    <rect class="node" x="690" y="0" width="150" height="92" rx="20"/>
    <circle cx="720" cy="32" r="15" class="accent-green"/>
    <text x="745" y="36" class="card-title">Build</text>
    <text x="712" y="67" class="card-text">TDD + verify</text>

    <path class="line" d="M848 46 H908"/>

    <rect class="node" x="920" y="0" width="150" height="92" rx="20"/>
    <circle cx="950" cy="32" r="15" class="accent-pink"/>
    <text x="975" y="36" class="card-title">Review</text>
    <text x="942" y="67" class="card-text">quality package</text>
  </g>

  <g transform="translate(226 366)">
    <rect class="node" x="0" y="0" width="748" height="122" rx="26"/>
    <text x="32" y="40" class="card-title">Autonomous where safe, human-approved where risky</text>
    <text x="32" y="72" class="card-text">interview → plan → guard → implement → review → document → commit</text>
    <text x="32" y="98" class="card-text">commit → push requires explicit approval and policy scan</text>
    <g transform="translate(540 27)">
      <rect x="0" y="0" width="160" height="68" rx="18" fill="#0d1117" stroke="#30363d"/>
      <text x="21" y="29" class="small">APPROVAL GATE</text>
      <text x="27" y="53" class="card-title">Push</text>
    </g>
  </g>

  <!-- support components -->
  <g transform="translate(60 550)">
    <rect class="node" x="0" y="0" width="250" height="120" rx="24"/>
    <rect x="22" y="23" width="48" height="48" rx="14" class="accent-cyan"/>
    <text x="88" y="43" class="card-title">Workflow OS</text>
    <text x="22" y="80" class="card-text">phase control · command catalog</text>
    <text x="22" y="103" class="card-text">guarded tool usage</text>
  </g>

  <g transform="translate(340 550)">
    <rect class="node" x="0" y="0" width="250" height="120" rx="24"/>
    <rect x="22" y="23" width="48" height="48" rx="14" class="accent-green"/>
    <text x="88" y="43" class="card-title">External Memory</text>
    <text x="22" y="80" class="card-text">durable facts · feedback</text>
    <text x="22" y="103" class="card-text">top-N relevant injection</text>
  </g>

  <g transform="translate(620 550)">
    <rect class="node" x="0" y="0" width="250" height="120" rx="24"/>
    <rect x="22" y="23" width="48" height="48" rx="14" class="accent-amber"/>
    <text x="88" y="43" class="card-title">Failure Evidence</text>
    <text x="22" y="80" class="card-text">field logs · audit stream</text>
    <text x="22" y="103" class="card-text">recovery hints</text>
  </g>

  <g transform="translate(900 550)">
    <rect class="node" x="0" y="0" width="250" height="120" rx="24"/>
    <rect x="22" y="23" width="48" height="48" rx="14" class="accent-pink"/>
    <text x="88" y="43" class="card-title">TUI Experience</text>
    <text x="22" y="80" class="card-text">wizard · theme · boxes</text>
    <text x="22" y="103" class="card-text">low-noise progress</text>
  </g>

  <text x="62" y="722" class="bg-text">Built as a reusable project-local harness template under target/.pi/ for Pi coding-agent sessions.</text>
</svg>
