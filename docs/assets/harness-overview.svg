<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Pi Workflow Harness angular overview</title>
  <desc id="desc">A visual overview of Pi Workflow Harness as an angular AI coding workflow. The process moves through interview, plan, ambiguity guard, implementation, review, documentation and commit, with explicit repair and evidence feedback paths. Supporting components include workflow policy, external memory, failure logs, and TUI helpers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1 1 L11 6 L1 11 L4 6 Z" fill="#8b949e"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1 1 L11 6 L1 11 L4 6 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1 1 L11 6 L1 11 L4 6 Z" fill="#fbbf24"/>
    </marker>
    <style>
      .title { fill: #f0f6fc; font: 800 46px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: -0.9px; }
      .subtitle { fill: #c9d1d9; font: 500 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .card-title { fill: #f0f6fc; font: 800 19px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .card-text { fill: #c9d1d9; font: 500 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .small { fill: #8b949e; font: 700 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0.4px; }
      .node { fill: #161b22; stroke: #30363d; stroke-width: 1.5; filter: url(#shadow); }
      .board { fill: #0d1117; stroke: #30363d; stroke-width: 1.3; opacity: 0.82; }
      .chip { fill: #0d1117; stroke: #30363d; stroke-width: 1; }
      .lane { fill: #111827; stroke: #30363d; stroke-width: 1; opacity: 0.72; }
      .flow { stroke: #8b949e; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: square; stroke-linejoin: miter; opacity: 0.95; }
      .feedback { stroke: #22d3ee; stroke-width: 2.6; fill: none; marker-end: url(#arrowCyan); stroke-dasharray: 8 8; stroke-linecap: square; stroke-linejoin: miter; opacity: 0.92; }
      .repair { stroke: #fbbf24; stroke-width: 2.6; fill: none; marker-end: url(#arrowAmber); stroke-dasharray: 8 8; stroke-linecap: square; stroke-linejoin: miter; opacity: 0.96; }
      .dash { stroke: #4b5563; stroke-width: 1.8; stroke-dasharray: 6 7; fill: none; }
      .accent-cyan { fill: url(#cyan); }
      .accent-pink { fill: url(#pink); }
      .accent-green { fill: url(#green); }
      .accent-amber { fill: url(#amber); }
    </style>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="1056" cy="92" r="175" fill="#1f6feb" opacity="0.10"/>
  <circle cx="118" cy="672" r="180" fill="#d946ef" opacity="0.08"/>
  <path d="M70 112 C268 38, 392 146, 554 82 S858 32, 1090 168" class="dash" opacity="0.24"/>

  <text x="62" y="98" class="title">Pi Workflow Harness</text>
  <text x="62" y="133" class="subtitle">A structured operating layer for safer AI coding sessions</text>

  <g transform="translate(858 70)">
    <rect class="chip" width="274" height="42" rx="21"/>
    <circle cx="25" cy="21" r="8" class="accent-green"/>
    <text x="45" y="27" class="card-text">Installs as AGENTS.md + .pi/</text>
  </g>

  <!-- angular workflow board -->
  <g transform="translate(60 178)">
    <rect class="board" width="1080" height="388" rx="26"/>
    <rect class="lane" x="28" y="28" width="1024" height="150" rx="20"/>
    <rect class="lane" x="28" y="210" width="1024" height="150" rx="20"/>
    <text x="50" y="58" class="small">DEFINE + PROTECT</text>
    <text x="50" y="240" class="small">BUILD + PROVE + CARRY FORWARD</text>

    <g transform="translate(56 78)">
      <rect class="node" width="172" height="92" rx="18"/>
      <circle cx="30" cy="31" r="14" class="accent-cyan"/>
      <text x="56" y="36" class="card-title">Interview</text>
      <text x="22" y="66" class="card-text">goal · scope · risk</text>
    </g>

    <path class="flow" d="M238 124 H318"/>

    <g transform="translate(330 78)">
      <rect class="node" width="172" height="92" rx="18"/>
      <circle cx="30" cy="31" r="14" class="accent-cyan"/>
      <text x="56" y="36" class="card-title">Plan</text>
      <text x="22" y="66" class="card-text">spec · tasks · checks</text>
    </g>

    <path class="flow" d="M512 124 H592"/>

    <g transform="translate(604 78)">
      <rect class="node" width="172" height="92" rx="18"/>
      <circle cx="30" cy="31" r="14" class="accent-amber"/>
      <text x="56" y="36" class="card-title">Guard</text>
      <text x="22" y="66" class="card-text">DPAA · SBADR</text>
    </g>

    <path class="flow" d="M786 124 H866"/>

    <g transform="translate(878 78)">
      <rect class="node" width="172" height="92" rx="18"/>
      <circle cx="30" cy="31" r="14" class="accent-green"/>
      <text x="56" y="36" class="card-title">Implement</text>
      <text x="22" y="66" class="card-text">TDD · verify</text>
    </g>

    <path class="flow" d="M964 180 V244"/>

    <g transform="translate(878 260)">
      <rect class="node" width="172" height="92" rx="18"/>
      <circle cx="30" cy="31" r="14" class="accent-pink"/>
      <text x="56" y="36" class="card-title">Review</text>
      <text x="22" y="66" class="card-text">quality package</text>
    </g>

    <path class="flow" d="M868 306 H788"/>

    <g transform="translate(604 260)">
      <rect class="node" width="172" height="92" rx="18"/>
      <circle cx="30" cy="31" r="14" class="accent-green"/>
      <text x="56" y="36" class="card-title">Document</text>
      <text x="22" y="66" class="card-text">commit · push · done</text>
    </g>

    <path class="flow" d="M594 306 H514"/>

    <g transform="translate(330 260)">
      <rect class="node" width="172" height="92" rx="18"/>
      <circle cx="30" cy="31" r="14" class="accent-cyan"/>
      <text x="56" y="36" class="card-title">Evidence</text>
      <text x="22" y="66" class="card-text">ledger · memory · logs</text>
    </g>

    <path class="feedback" d="M330 306 H142 V182"/>
    <text x="92" y="306" class="small">next iteration</text>

    <path class="repair" d="M604 78 V42 H416 V70"/>
    <text x="456" y="38" class="small">repair ambiguous plan</text>

    <path class="repair" d="M878 306 H830 V218 H964 V248"/>
    <text x="818" y="218" class="small">fix review findings</text>
  </g>

  <!-- support components -->
  <g transform="translate(60 616)">
    <rect class="node" x="0" y="0" width="250" height="96" rx="23"/>
    <rect x="22" y="22" width="44" height="44" rx="13" class="accent-cyan"/>
    <text x="84" y="40" class="card-title">Workflow Policy</text>
    <text x="22" y="74" class="card-text">phase control · command catalog</text>
  </g>

  <g transform="translate(340 616)">
    <rect class="node" x="0" y="0" width="250" height="96" rx="23"/>
    <rect x="22" y="22" width="44" height="44" rx="13" class="accent-green"/>
    <text x="84" y="40" class="card-title">External Memory</text>
    <text x="22" y="74" class="card-text">durable facts · feedback</text>
  </g>

  <g transform="translate(620 616)">
    <rect class="node" x="0" y="0" width="250" height="96" rx="23"/>
    <rect x="22" y="22" width="44" height="44" rx="13" class="accent-amber"/>
    <text x="84" y="40" class="card-title">Failure Logs</text>
    <text x="22" y="74" class="card-text">audit stream · recovery hints</text>
  </g>

  <g transform="translate(900 616)">
    <rect class="node" x="0" y="0" width="250" height="96" rx="23"/>
    <rect x="22" y="22" width="44" height="44" rx="13" class="accent-pink"/>
    <text x="84" y="40" class="card-title">TUI Experience</text>
    <text x="22" y="74" class="card-text">wizard · theme · progress</text>
  </g>
</svg>
